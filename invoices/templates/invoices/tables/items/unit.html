<select
    name="unit"
    form="save-form-{{ record.id }}"
    class="border rounded px-2 py-1 w-full">


    {% for unit in table.units %}

        <option
            value="{{ unit.id }}"
            {% if record.unit_id == unit.id %}selected{% endif %}>

            {{ unit.name }}

        </option>

    {% endfor %}


</select>
