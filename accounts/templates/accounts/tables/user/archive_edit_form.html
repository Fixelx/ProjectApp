<form method="post" action="{% url 'accounts:user_edit' item.id %}">
    {% csrf_token %}

    <div>

        <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">

            <div>
                <label class="block text-sm mb-1">
                    Benutzername
                </label>

                <input
                    type="text"
                    name="username"
                    value="{{ item.username }}"
                    class="border rounded px-3 py-2 w-full">
            </div>


            <div>
                <label class="block text-sm mb-1">
                    Vorname
                </label>

                <input
                    type="text"
                    name="first_name"
                    value="{{ item.first_name }}"
                    class="border rounded px-3 py-2 w-full">
            </div>


            <div>
                <label class="block text-sm mb-1">
                    Nachname
                </label>

                <input
                    type="text"
                    name="last_name"
                    value="{{ item.last_name }}"
                    class="border rounded px-3 py-2 w-full">
            </div>


            <div>
                <label class="block text-sm mb-1">
                    E-Mail
                </label>

                <input
                    type="email"
                    name="email"
                    value="{{ item.email }}"
                    class="border rounded px-3 py-2 w-full">
            </div>


            <div>
                <label class="block text-sm mb-1">
                    Rolle
                </label>

                <select
                    name="role"
                    class="border rounded px-3 py-2 w-full">

                    <option value="">
                        ---
                    </option>

                    {% for role in table.roles %}
                        <option
                            value="{{ role.id }}"
                            {% if item.profile.role_id == role.id %}selected{% endif %}>
                            {{ role.name }}
                        </option>
                    {% endfor %}

                </select>
            </div>


            <div>
                <label class="block text-sm mb-1">
                    Letzter Login
                </label>

                <input
                    type="text"
                    disabled
                    value="{{ item.last_login|date:'d.m.Y H:i' }}"
                    class="border rounded px-3 py-2 w-full bg-slate-100 dark:bg-slate-700">
            </div>


        </div>


        <div class="mt-5 flex gap-2">

            <button
                type="submit"
                class="btn btn-save">
                Speichern
            </button>


            <button
                type="submit"
                formaction="{% url 'accounts:user_reactivate' item.id %}"
                class="btn btn-action">
                Aktivieren
            </button>

        </div>

    </div>

</form>
